<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>윤브르,장풍의 나주 생태지도 (온라인 공유판)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#12211a;
    --bg-panel:#1a2e24;
    --bg-panel-2:#20392c;
    --paper:#ece4cf;
    --ink:#eef2ea;
    --muted:#a9bdac;
    --line: rgba(238,242,234,0.12);
    --amber:#e3a857;
    --leaf:#7fb069;
    --slate:#93a6c9;
    --amber-dim: rgba(227,168,87,0.16);
    --leaf-dim: rgba(127,176,105,0.16);
    --slate-dim: rgba(147,166,201,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg-deep);
    color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  /* ---------- header ---------- */
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:18px 26px 14px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-deep));
    flex-shrink:0;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{display:flex; align-items:baseline; gap:14px;}
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:0.2px;
    margin:0;
    color:var(--ink);
  }
  .brand .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.5px;
  }
  .stats{
    display:flex; gap:18px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--muted);
  }
  .stats b{color:var(--paper); font-size:15px; display:block; font-family:'Fraunces',serif; font-weight:600;}

  .storage-badge{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; padding:5px 10px;
    border-radius:20px; border:1px solid var(--line); color:var(--muted); white-space:nowrap;
  }
  .storage-badge.on{ color:var(--leaf); border-color:rgba(127,176,105,0.4); background:var(--leaf-dim); }
  .storage-badge.off{ color:var(--amber); border-color:rgba(227,168,87,0.4); background:var(--amber-dim); }

  .header-actions{display:flex; gap:8px;}
  .hbtn{
    position:relative;
    font-family:'IBM Plex Mono', monospace; font-size:11px; padding:6px 11px;
    border-radius:7px; border:1px solid var(--line); background:transparent; color:var(--muted);
    cursor:pointer; white-space:nowrap; display:inline-flex; align-items:center; gap:4px;
  }
  .hbtn:hover{ color:var(--ink); border-color:var(--paper); }

  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--bg-panel-2); border:1px solid var(--line); border-radius:10px;
    padding:11px 12px 11px 16px; display:flex; align-items:center; gap:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.35); z-index:2000;
    opacity:0; pointer-events:none; transition:opacity .18s, transform .18s;
    font-size:13px; color:var(--ink);
  }
  .toast.show{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  .toast button{
    background:var(--leaf); color:#12211a; border:none; border-radius:6px; padding:6px 10px;
    font-weight:600; font-size:12px; cursor:pointer; font-family:'IBM Plex Sans KR';
  }

  /* ---------- layout ---------- */
  .layout{flex:1; display:flex; min-height:0; position:relative;}
  #map{flex:1; min-width:0; background:#0e1a14;}
  .sidebar{
    width:300px;
    flex-shrink:0;
    border-left:1px solid var(--line);
    background:var(--bg-panel);
    display:flex;
    flex-direction:column;
    min-height:0;
    transition:width .18s ease, min-width .18s ease;
  }
  .sidebar.collapsed{ width:0; min-width:0; overflow:hidden; border-left:none; }
  .sidebar-toggle{
    position:absolute;
    top:70px;
    right:300px;
    z-index:600;
    width:26px; height:44px;
    background:var(--bg-panel-2);
    border:1px solid var(--line);
    border-right:none;
    border-radius:8px 0 0 8px;
    color:var(--muted);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:13px;
    transition:right .18s ease;
  }
  .sidebar-toggle.collapsed{ right:0; }
  .sidebar-top{
    padding:16px 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex; flex-direction:column; gap:10px;
  }
  .filters{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    padding:5px 10px;
    border-radius:20px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    transition:all .15s;
  }
  .chip.active{ color:var(--bg-deep); font-weight:600; }
  .chip[data-cat="all"].active{background:var(--paper); border-color:var(--paper);}
  .chip[data-cat="insect"].active{background:var(--amber); border-color:var(--amber);}
  .chip[data-cat="plant"].active{background:var(--leaf); border-color:var(--leaf);}
  .chip[data-cat="other"].active{background:var(--slate); border-color:var(--slate);}

  .add-btn{
    width:100%;
    padding:11px 14px;
    background:var(--paper);
    color:#1a2e24;
    border:none;
    border-radius:8px;
    font-family:'IBM Plex Sans KR';
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    letter-spacing:0.2px;
  }
  .add-btn:hover{filter:brightness(1.06);}

  .list{ flex:1; overflow-y:auto; padding:10px 12px 20px;}
  .card{
    display:flex;
    gap:10px;
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
    background:var(--bg-panel-2);
    border:1px solid transparent;
    cursor:pointer;
    transition:border-color .15s, transform .1s;
  }
  .card:hover{border-color:var(--line); transform:translateX(-1px);}
  .card.selected{border-color:var(--paper);}
  .thumb{
    width:56px; height:56px; border-radius:7px; flex-shrink:0;
    background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    position:relative;
  }
  .thumb-add{
    position:absolute; inset:0; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .thumb-add input{position:absolute; inset:0; opacity:0; cursor:pointer;}
  .thumb-add .cam{
    font-size:11px; background:rgba(18,33,26,0.82); color:var(--paper);
    border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center;
    position:absolute; bottom:-2px; right:-2px; border:1.5px solid var(--bg-panel-2);
  }
  .card-body{min-width:0; flex:1;}
  .card-name{font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card-latin{
    font-family:'IBM Plex Mono', monospace;
    font-style:italic; font-size:11px; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-meta{font-size:10.5px; color:var(--muted); margin-top:3px; font-family:'IBM Plex Mono', monospace;}
  .tag-dot{width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px;}
  .card-actions{
    display:flex; flex-direction:column; gap:4px; flex-shrink:0;
  }
  .icon-btn{
    width:24px; height:24px; border-radius:6px; border:1px solid var(--line);
    background:var(--bg-deep); color:var(--muted); font-size:11px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover{ color:var(--ink); border-color:var(--paper); }

  /* ---------- popup ---------- */
  .leaflet-popup-content-wrapper{
    background:var(--bg-panel-2); color:var(--ink); border-radius:10px;
  }
  .leaflet-popup-tip{background:var(--bg-panel-2);}
  .pop{width:210px;}
  .pop img{width:100%; height:120px; object-fit:cover; border-radius:6px; margin-bottom:8px; display:block;}
  .pop-name{font-weight:600; font-size:14px;}
  .pop-latin{font-family:'IBM Plex Mono',monospace; font-style:italic; font-size:11.5px; color:var(--muted); margin:2px 0 6px;}
  .pop-meta{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted); line-height:1.5;}
  .leaflet-popup-close-button{color:var(--muted) !important;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(10,16,12,0.72);
    display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--bg-panel); border:1px solid var(--line);
    border-radius:14px; width:100%; max-width:460px;
    max-height:88vh; overflow-y:auto;
    padding:22px 24px 24px;
  }
  .modal h2{font-family:'Fraunces',serif; font-size:20px; margin:0 0 4px;}
  .modal .hint{font-size:12px; color:var(--muted); margin-bottom:18px;}
  label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; font-family:'IBM Plex Mono', monospace;}
  input[type=text], input[type=date], select, textarea{
    width:100%; padding:9px 11px; border-radius:7px;
    border:1px solid var(--line); background:var(--bg-deep); color:var(--ink);
    font-family:'IBM Plex Sans KR'; font-size:13.5px;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--leaf); outline-offset:1px;}
  .row2{display:flex; gap:10px;}
  .row2 > div{flex:1;}
  .loc-tabs{display:flex; gap:6px; margin-bottom:8px;}
  .loc-tab{
    flex:1; text-align:center; padding:7px; border-radius:7px; font-size:12px; cursor:pointer;
    background:var(--bg-deep); color:var(--muted); border:1px solid var(--line);
  }
  .loc-tab.active{background:var(--leaf-dim); color:var(--leaf); border-color:var(--leaf);}
  .loc-pane{display:none;}
  .loc-pane.active{display:block;}
  #pickMap{height:180px; border-radius:8px; margin-top:6px;}
  .coord-readout{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:6px;
  }
  .file-drop{
    border:1.5px dashed var(--line); border-radius:9px; padding:16px; text-align:center;
    color:var(--muted); font-size:12.5px; cursor:pointer; position:relative;
  }
  .file-drop.has-img{ padding:0; border-style:solid; overflow:hidden;}
  .file-drop img{width:100%; max-height:160px; object-fit:cover; display:block;}
  .file-drop input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer;}
  .photo-remove{
    position:absolute; top:8px; right:8px; z-index:5;
    width:26px; height:26px; border-radius:50%; border:none;
    background:rgba(18,33,26,0.78); color:var(--paper); font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-actions{display:flex; gap:10px; margin-top:20px;}
  .btn{
    flex:1; padding:11px; border-radius:8px; border:none; font-weight:600; cursor:pointer; font-size:13.5px;
    font-family:'IBM Plex Sans KR';
  }
  .btn-primary{background:var(--leaf); color:#12211a;}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid var(--line);}
  .btn-danger{background:transparent; color:#e08b7d; border:1px solid rgba(224,139,125,0.4);}
  .err{color:#e3a857; font-size:12px; margin-top:8px; display:none;}
  .close-x{position:absolute; top:14px; right:16px; cursor:pointer; color:var(--muted); font-size:20px; background:none; border:none;}
  .modal{position:relative;}

  .empty-note{
    text-align:center; color:var(--muted); font-size:12.5px; padding:30px 20px; line-height:1.6;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:10px;}

  @media (max-width: 820px){
    .sidebar{width:100%; position:fixed; bottom:0; left:0; right:0; top:auto; height:46%; border-left:none; border-top:1px solid var(--line); z-index:500;}
    .layout{position:relative;}
    #map{height:100%;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>윤브르,장풍의 나주 생태지도</h1>
    <div class="sub">NAJU FIELD ATLAS · 전라남도 나주시 · 온라인 공유판(모두가 함께 기록)</div>
  </div>
  <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
    <div class="stats">
      <div>종 기록<b id="statCount">0</b></div>
      <div>곤충<b id="statInsect">0</b></div>
      <div>식물<b id="statPlant">0</b></div>
      <div>기타<b id="statOther">0</b></div>
    </div>
    <div id="storageBadge" class="storage-badge">저장 상태 확인 중…</div>
    <div class="header-actions">
      <button class="hbtn" id="exportBtn" title="모든 기록을 JSON 파일로 저장">⤓ 내보내기</button>
      <label class="hbtn" title="JSON 백업 파일 불러오기" style="overflow:hidden;">
        ⤒ 불러오기
        <input type="file" accept="application/json" id="importInput" style="position:absolute; inset:0; opacity:0; cursor:pointer;" />
      </label>
    </div>
  </div>
</header>

<div class="toast" id="undoToast">
  <span class="msg"></span>
  <button id="undoBtn">실행취소</button>
</div>

<div class="layout">
  <div id="map"></div>
  <button class="sidebar-toggle" id="sidebarToggle" title="목록 접기/펼치기">›</button>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top"><input type="text" id="searchInput" placeholder="🔍 생물 이름 검색..." style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:rgba(127,176,105,.12);color:var(--ink);margin-bottom:10px;">
      <div class="filters">
        <button class="chip active" data-cat="all">전체</button>
        <button class="chip" data-cat="insect"><span class="tag-dot" style="background:var(--amber)"></span>곤충</button>
        <button class="chip" data-cat="plant"><span class="tag-dot" style="background:var(--leaf)"></span>식물</button>
        <button class="chip" data-cat="other"><span class="tag-dot" style="background:var(--slate)"></span>기타 동물</button>
      </div>
      <button class="add-btn" id="openAdd">+ 관찰 기록 추가</button>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-x" id="closeModal">×</button>
    <h2 id="modalTitle">관찰 기록 추가</h2>
    <div class="hint">이름·학명·위치를 입력하면 지도에 자동으로 표시돼요.</div>

    <label>사진</label>
    <div class="file-drop" id="fileDrop">
      <span id="fileDropText">탭해서 사진 선택 (선택사항)</span>
      <input type="file" accept="image/*" id="photoInput" />
    </div>

    <div class="row2">
      <div>
        <label>이름</label>
        <input type="text" id="fName" placeholder="예: 칠성무당벌레" />
      </div>
      <div>
        <label>분류</label>
        <select id="fCat">
          <option value="insect">곤충</option>
          <option value="plant">식물</option>
          <option value="other">기타 동물</option>
        </select>
      </div>
    </div>

    <label>학명</label>
    <input type="text" id="fLatin" placeholder="예: Coccinella septempunctata" />

    <label>관찰 위치</label>
    <div class="loc-tabs">
      <div class="loc-tab active" data-pane="plus">구글 Plus Code</div>
      <div class="loc-tab" data-pane="pick">지도에서 선택</div>
      <div class="loc-tab" data-pane="manual">위도/경도 직접입력</div>
    </div>

    <div class="loc-pane active" data-pane="plus">
      <input type="text" id="fPlus" placeholder="예: 2Q4P+M7W 나주시 전라남도" />
      <div class="coord-readout" id="plusReadout">플러스코드를 입력하면 좌표가 여기에 표시돼요.</div>
    </div>
    <div class="loc-pane" data-pane="pick">
      <div id="pickMap"></div>
      <div class="coord-readout" id="pickReadout">지도를 클릭해 위치를 지정하세요.</div>
    </div>
    <div class="loc-pane" data-pane="manual">
      <div class="row2">
        <div><label>위도 (lat)</label><input type="text" id="fLat" placeholder="35.0160" /></div>
        <div><label>경도 (lng)</label><input type="text" id="fLng" placeholder="126.7108" /></div>
      </div>
    </div>

    <label>관찰 날짜</label>
    <input type="date" id="fDate" />

    <label>메모 (선택)</label>
    <textarea id="fNote" rows="2" placeholder="발견 상황, 특징 등"></textarea>

    <div class="err" id="formErr"></div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteBtn" style="display:none;">삭제</button>
      <button class="btn btn-ghost" id="dupBtn" style="display:none;">복제</button>
      <button class="btn btn-ghost" id="cancelBtn">취소</button>
      <button class="btn btn-primary" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* =========================================================
   Open Location Code (Google Plus Code) — decode & encode
   Standalone reimplementation so plus codes can be typed in
   directly (e.g. "2Q4P+M7W 나주시 전라남도") and converted
   to lat/lng automatically, anchored near Naju-si.
   ========================================================= */
const OLC_ALPHABET = '23456789CFGHJMPQRVWX';
const OLC_SEP = '+';
const GRID_COLS = 4, GRID_ROWS = 5;
const NAJU_REF = { lat: 35.0212, lng: 126.7908 }; // 봉황고등학교·빛가람동 인근, 짧은 코드 복원 기준점

function olcEncode(lat, lng){
  if (lat >= 90) lat = 90 - 1e-9;
  if (lat < -90) lat = -90;
  lng = ((lng + 180) % 360 + 360) % 360 - 180;
  let latN = lat + 90, lngN = lng + 180;
  let code = '', place = 20;
  for (let i=0;i<5;i++){
    const dLat = Math.min(19, Math.floor(latN/place));
    const dLng = Math.min(19, Math.floor(lngN/place));
    code += OLC_ALPHABET[dLat] + OLC_ALPHABET[dLng];
    latN -= dLat*place; lngN -= dLng*place;
    place /= 20;
  }
  return code.slice(0,8) + OLC_SEP + code.slice(8);
}

function olcDecode(code){
  const clean = code.replace(/[+0]/g,'');
  let latVal = -90, lngVal = -180, place = 400, i = 0;
  for (; i < Math.min(clean.length,10); i+=2){
    place /= 20;
    latVal += OLC_ALPHABET.indexOf(clean[i]) * place;
    lngVal += OLC_ALPHABET.indexOf(clean[i+1]) * place;
  }
  let latRes = place, lngRes = place;
  for (; i < clean.length; i++){
    const d = OLC_ALPHABET.indexOf(clean[i]);
    if (d < 0) continue;
    const row = Math.floor(d/GRID_COLS), col = d % GRID_COLS;
    latRes /= GRID_ROWS; lngRes /= GRID_COLS;
    latVal += row*latRes; lngVal += col*lngRes;
  }
  return { lat: latVal + latRes/2, lng: lngVal + lngRes/2 };
}

// Parses free text like "2Q4P+M7W 나주시 전라남도" -> extracts the code, recovers short codes
function parsePlusCode(text, refLat, refLng){
  const m = text.match(/[23456789CFGHJMPQRVWX]{2,8}\+[23456789CFGHJMPQRVWX]{2,7}/i);
  if (!m) return null;
  const raw = m[0].toUpperCase();
  const sepIdx = raw.indexOf('+');
  const before = raw.slice(0, sepIdx);
  const after = raw.slice(sepIdx+1);
  const missing = 8 - before.length;
  if (missing <= 0) return olcDecode(raw);
  const refFull = olcEncode(refLat, refLng).replace('+','');
  const prefix = refFull.slice(0, missing);
  return olcDecode(prefix + before + OLC_SEP + after);
}

function buildSeed(){
  return seedEntries.map((e, idx) => {
    const coords = parsePlusCode(e[3] + " 나주시 전라남도", NAJU_REF.lat, NAJU_REF.lng);
    return {
      id: 'seed-' + idx,
      name: e[0], latin: e[1], cat: e[2],
      plusCode: e[3], date: e[4], note: e[5],
      lat: coords.lat, lng: coords.lng,
      photo: seedPhotos[idx] || null
    };
  });
}

let entries = [];
let activeFilter = 'all';
let selectedId = null;
let editingId = null;
let pickedLatLng = null;

/* ========================= Map setup ========================= */
const map = L.map('map', { zoomControl:true }).setView([NAJU_REF.lat, NAJU_REF.lng], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19, subdomains:'abc'
}).addTo(map);

let markers = {}; // id -> marker

function markerIcon(cat, isSelected){
  const color = CAT_COLOR[cat] || CAT_COLOR.other;
  const dotSize = isSelected ? 24 : 18;
  return L.divIcon({
    className:'',
    html:`<div style="
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    "><div style="
      width:${dotSize}px;height:${dotSize}px;border-radius:50%;
      background:${color}; border:2px solid #12211a;
      box-shadow:0 0 0 ${isSelected?4:0}px ${color}55, 0 1px 4px rgba(0,0,0,0.5);
    "></div></div>`,
    // hit area is bigger than the visible dot so it's easy to tap on mobile
    iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-14]
  });
}

function renderMarkers(){
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  filteredEntries().forEach(e => {
    const marker = L.marker([e.lat, e.lng], { icon: markerIcon(e.cat, e.id===selectedId) });
    const photoHtml = e.photo ? `<img src="${e.photo}" />` : '';
    marker.bindPopup(`
      <div class="pop">
        ${photoHtml}
        <div class="pop-name">${escapeHtml(e.name)}</div>
        <div class="pop-latin">${escapeHtml(e.latin || '')}</div>
        <div class="pop-meta">${CAT_LABEL[e.cat]} · ${e.date || '-'}<br/>${e.plusCode ? e.plusCode + ' · ' : ''}${e.lat.toFixed(5)}, ${e.lng.toFixed(5)}</div>
      </div>
    `, { closeButton:true, autoPan:true });
    // Tap/click: select + visually enlarge this marker + open its popup immediately,
    // WITHOUT rebuilding all markers (rebuilding would instantly destroy the popup
    // Leaflet just opened, which was the bug — tapping a dot did nothing visible).
    marker.on('click', () => {
      const prevId = selectedId;
      selectedId = e.id;
      if (prevId && prevId !== e.id && markers[prevId]){
        const prevEntry = entries.find(x=>x.id===prevId);
        if (prevEntry) markers[prevId].setIcon(markerIcon(prevEntry.cat, false));
      }
      marker.setIcon(markerIcon(e.cat, true));
      marker.openPopup();
      renderList();
    });
    marker.addTo(map);
    markers[e.id] = marker;
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function filteredEntries(){
  return activeFilter === 'all' ? entries : entries.filter(e => e.cat === activeFilter);
}

/* ========================= List & stats ========================= */
function renderStats(){
  document.getElementById('statCount').textContent = entries.length;
  document.getElementById('statInsect').textContent = entries.filter(e=>e.cat==='insect').length;
  document.getElementById('statPlant').textContent = entries.filter(e=>e.cat==='plant').length;
  document.getElementById('statOther').textContent = entries.filter(e=>e.cat==='other').length;
}

function renderList(){
  const list = document.getElementById('list');
  const items = filteredEntries().slice().sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  if (items.length === 0){
    list.innerHTML = `<div class="empty-note">아직 기록이 없어요.<br/>오른쪽 위 버튼으로 첫 관찰을 추가해보세요.</div>`;
    renderStats();
    return;
  }
  list.innerHTML = items.map(e => `
    <div class="card ${e.id===selectedId?'selected':''}" data-id="${e.id}">
      <div class="thumb" style="${e.photo ? `background-image:url(${e.photo})` : `background:${CAT_COLOR[e.cat]}22;`}">
        ${e.photo ? '' : CAT_EMOJI[e.cat]}
        <label class="thumb-add" title="사진 추가">
          <input type="file" accept="image/*" data-quickphoto="${e.id}" />
          <span class="cam">＋</span>
        </label>
      </div>
      <div class="card-body">
        <div class="card-name">${escapeHtml(e.name)}</div>
        <div class="card-latin">${escapeHtml(e.latin||'')}</div>
        <div class="card-meta"><span class="tag-dot" style="background:${CAT_COLOR[e.cat]}"></span>${CAT_LABEL[e.cat]} · ${e.date||'-'}</div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" data-edit="${e.id}" title="수정">✎</button>
        <button class="icon-btn" data-quickdel="${e.id}" title="삭제">🗑</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.icon-btn[data-edit]').forEach(btn=>{
    btn.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      const e = entries.find(x=>x.id===btn.dataset.edit);
      if (e) openModal(e);
    });
  });
  list.querySelectorAll('.icon-btn[data-quickdel]').forEach(btn=>{
    btn.addEventListener('click', async (ev)=>{
      ev.stopPropagation();
      const idx = entries.findIndex(x=>x.id===btn.dataset.quickdel);
      if (idx < 0) return;
      const [removed] = entries.splice(idx, 1);
      if (selectedId === removed.id) selectedId = null;
      await saveEntries();
      renderList(); renderMarkers();
      showUndoToast(removed);
    });
  });
  list.querySelectorAll('.thumb-add').forEach(label => {
    label.addEventListener('click', (ev)=> ev.stopPropagation());
  });
  list.querySelectorAll('[data-quickphoto]').forEach(input => {
    input.addEventListener('click', (ev)=> ev.stopPropagation());
    input.addEventListener('change', (ev)=>{
      ev.stopPropagation();
      const file = ev.target.files[0];
      if (file) handleQuickPhoto(input.dataset.quickphoto, file);
    });
  });
  list.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const e = entries.find(x=>x.id===id);
      selectedId = id;
      map.setView([e.lat, e.lng], 17, { animate:true });
      renderList(); renderMarkers();
      setTimeout(()=> markers[id] && markers[id].openPopup(), 300);
    });
    card.addEventListener('dblclick', () => {
      const e = entries.find(x=>x.id===card.dataset.id);
      openModal(e);
    });
  });
  renderStats();
}

document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.cat;
    renderList(); renderMarkers();
  });
});

/* ========================= Storage ========================= */
// IS_ONLINE_MODE: true = try Anthropic's shared window.storage first (works when
// this page is opened as a Claude.ai artifact link, and is shared across everyone
// who opens that link). Falls back to localStorage (this device only) if unavailable.
const IS_ONLINE_MODE = true;

function updateStorageBadge(mode){
  const badge = document.getElementById('storageBadge');
  if (mode === 'online'){
    badge.textContent = '🟢 온라인 공유 저장 중';
    badge.className = 'storage-badge on';
  } else {
    badge.textContent = '🟡 이 기기에만 저장됨 (오프라인)';
    badge.className = 'storage-badge off';
  }
}

async function loadEntries(){
  let needsResave = false;
  let mode = 'offline';
  if (IS_ONLINE_MODE && window.storage){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      entries = JSON.parse(res.value);
      mode = 'online';
    }catch(err){
      // no shared entry yet, or storage unreachable — try local backup, else seed
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        entries = raw ? JSON.parse(raw) : buildSeed();
      }catch(e2){ entries = buildSeed(); }
      needsResave = true;
      // still try to push this to shared storage so it starts syncing
      try{ await window.storage.set(STORAGE_KEY, JSON.stringify(entries), true); mode='online'; }catch(e3){ mode='offline'; }
    }
  } else {
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : buildSeed();
    }catch(e){ entries = buildSeed(); }
    needsResave = !localStorage.getItem(STORAGE_KEY);
  }

  entries.forEach(e => {
    if (e.id && e.id.startsWith('seed-') && !e.photo){
      const idx = parseInt(e.id.replace('seed-',''), 10);
      if (seedPhotos[idx]){ e.photo = seedPhotos[idx]; needsResave = true; }
    }
  });

  updateStorageBadge(mode);
  if (needsResave) await saveEntries();
  renderList(); renderMarkers();
}

async function saveEntries(){
  let mode = 'offline';
  if (IS_ONLINE_MODE && window.storage){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(entries), true);
      mode = 'online';
    }catch(err){
      console.error('온라인 저장 실패, 이 기기에만 저장합니다', err);
    }
  }
  // always keep a local copy too, as a safety net
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }catch(e){}
  updateStorageBadge(mode);
}

/* ========================= Modal logic ========================= */
const overlay = document.getElementById('overlay');
let pickMapInstance = null, pickMarker = null;

function openModal(existing){
  editingId = existing ? existing.id : null;
  document.getElementById('modalTitle').textContent = existing ? '관찰 기록 수정' : '관찰 기록 추가';
  document.getElementById('deleteBtn').style.display = existing ? 'block' : 'none';
  document.getElementById('dupBtn').style.display = existing ? 'block' : 'none';
  document.getElementById('formErr').style.display = 'none';

  document.getElementById('fName').value = existing?.name || '';
  document.getElementById('fLatin').value = existing?.latin || '';
  document.getElementById('fCat').value = existing?.cat || 'insect';
  document.getElementById('fDate').value = existing?.date || new Date().toISOString().slice(0,10);
  document.getElementById('fNote').value = existing?.note || '';
  document.getElementById('fPlus').value = existing?.plusCode || '';
  document.getElementById('fLat').value = existing?.lat || '';
  document.getElementById('fLng').value = existing?.lng || '';
  document.getElementById('plusReadout').textContent = existing ? `${existing.lat.toFixed(5)}, ${existing.lng.toFixed(5)}` : '플러스코드를 입력하면 좌표가 여기에 표시돼요.';

  const drop = document.getElementById('fileDrop');
  if (existing && existing.photo){
    drop.classList.add('has-img');
    drop.innerHTML = `<img src="${existing.photo}"/><input type="file" accept="image/*" id="photoInput"/><button type="button" class="photo-remove" id="photoRemoveBtn">×</button>`;
  } else {
    drop.classList.remove('has-img');
    drop.innerHTML = `<span id="fileDropText">탭해서 사진 선택 (선택사항)</span><input type="file" accept="image/*" id="photoInput"/>`;
  }
  bindPhotoInput();
  window._currentPhoto = existing?.photo || null;

  overlay.classList.add('show');
  switchLocTab('plus');

  setTimeout(()=>{
    if (!pickMapInstance){
      pickMapInstance = L.map('pickMap').setView([existing?.lat || NAJU_REF.lat, existing?.lng || NAJU_REF.lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{subdomains:'abc'}).addTo(pickMapInstance);
      pickMapInstance.on('click', (ev)=>{
        pickedLatLng = ev.latlng;
        if (pickMarker) pickMapInstance.removeLayer(pickMarker);
        pickMarker = L.marker(ev.latlng).addTo(pickMapInstance);
        document.getElementById('pickReadout').textContent = `${ev.latlng.lat.toFixed(5)}, ${ev.latlng.lng.toFixed(5)}`;
      });
    } else {
      pickMapInstance.invalidateSize();
      pickMapInstance.setView([existing?.lat || NAJU_REF.lat, existing?.lng || NAJU_REF.lng], 15);
    }
    if (existing){
      pickedLatLng = L.latLng(existing.lat, existing.lng);
      if (pickMarker) pickMapInstance.removeLayer(pickMarker);
      pickMarker = L.marker(pickedLatLng).addTo(pickMapInstance);
      document.getElementById('pickReadout').textContent = `${existing.lat.toFixed(5)}, ${existing.lng.toFixed(5)}`;
    }
  }, 50);
}

function compressImageFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 900;
        let w = img.width, h = img.height;
        if (w > h && w > maxDim){ h = h*maxDim/w; w = maxDim; }
        else if (h > maxDim){ w = w*maxDim/h; h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function bindPhotoInput(){
  const input = document.getElementById('photoInput');
  input.addEventListener('change', async (ev)=>{
    const file = ev.target.files[0];
    if (!file) return;
    const dataUrl = await compressImageFile(file);
    window._currentPhoto = dataUrl;
    const drop = document.getElementById('fileDrop');
    drop.classList.add('has-img');
    drop.innerHTML = `<img src="${dataUrl}"/><input type="file" accept="image/*" id="photoInput"/><button type="button" class="photo-remove" id="photoRemoveBtn">×</button>`;
    bindPhotoInput();
  });
  const removeBtn = document.getElementById('photoRemoveBtn');
  if (removeBtn){
    removeBtn.addEventListener('click', (ev)=>{
      ev.stopPropagation(); ev.preventDefault();
      window._currentPhoto = null;
      const drop = document.getElementById('fileDrop');
      drop.classList.remove('has-img');
      drop.innerHTML = `<span id="fileDropText">탭해서 사진 선택 (선택사항)</span><input type="file" accept="image/*" id="photoInput"/>`;
      bindPhotoInput();
    });
  }
}

async function handleQuickPhoto(id, file){
  const dataUrl = await compressImageFile(file);
  const e = entries.find(x=>x.id===id);
  if (!e) return;
  e.photo = dataUrl;
  await saveEntries();
  renderList(); renderMarkers();
}

function closeModal(){
  overlay.classList.remove('show');
  editingId = null;
  pickedLatLng = null;
}

document.getElementById('openAdd').addEventListener('click', ()=> openModal(null));
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e)=>{ if (e.target === overlay) closeModal(); });

document.querySelectorAll('.loc-tab').forEach(tab=>{
  tab.addEventListener('click', ()=> switchLocTab(tab.dataset.pane));
});
function switchLocTab(pane){
  document.querySelectorAll('.loc-tab').forEach(t=>t.classList.toggle('active', t.dataset.pane===pane));
  document.querySelectorAll('.loc-pane').forEach(p=>p.classList.toggle('active', p.dataset.pane===pane));
  if (pane === 'pick' && pickMapInstance) setTimeout(()=>pickMapInstance.invalidateSize(), 80);
}

document.getElementById('fPlus').addEventListener('input', (e)=>{
  const val = e.target.value.trim();
  if (!val){ document.getElementById('plusReadout').textContent = '플러스코드를 입력하면 좌표가 여기에 표시돼요.'; return; }
  const coords = parsePlusCode(val, NAJU_REF.lat, NAJU_REF.lng);
  if (coords){
    document.getElementById('plusReadout').textContent = `${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`;
  } else {
    document.getElementById('plusReadout').textContent = '올바른 플러스코드 형식이 아니에요 (예: 2Q4P+M7W).';
  }
});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('fName').value.trim();
  const latin = document.getElementById('fLatin').value.trim();
  const cat = document.getElementById('fCat').value;
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();
  const errEl = document.getElementById('formErr');

  if (!name){ errEl.textContent = '이름을 입력해주세요.'; errEl.style.display='block'; return; }

  let lat, lng, plusCode = '';
  const activePane = document.querySelector('.loc-tab.active').dataset.pane;

  if (activePane === 'plus'){
    const val = document.getElementById('fPlus').value.trim();
    const coords = parsePlusCode(val, NAJU_REF.lat, NAJU_REF.lng);
    if (!coords){ errEl.textContent = '유효한 플러스코드를 입력해주세요.'; errEl.style.display='block'; return; }
    lat = coords.lat; lng = coords.lng;
    plusCode = val.match(/[23456789CFGHJMPQRVWX]{2,8}\+[23456789CFGHJMPQRVWX]{2,7}/i)[0].toUpperCase();
  } else if (activePane === 'pick'){
    if (!pickedLatLng){ errEl.textContent = '지도를 클릭해 위치를 선택해주세요.'; errEl.style.display='block'; return; }
    lat = pickedLatLng.lat; lng = pickedLatLng.lng;
  } else {
    lat = parseFloat(document.getElementById('fLat').value);
    lng = parseFloat(document.getElementById('fLng').value);
    if (isNaN(lat) || isNaN(lng)){ errEl.textContent = '위도/경도를 숫자로 입력해주세요.'; errEl.style.display='block'; return; }
  }

  errEl.style.display = 'none';

  if (editingId){
    const e = entries.find(x=>x.id===editingId);
    Object.assign(e, { name, latin, cat, date, note, lat, lng, plusCode, photo: window._currentPhoto || null });
  } else {
    entries.push({
      id: 'e-' + Date.now(),
      name, latin, cat, date, note, lat, lng, plusCode,
      photo: window._currentPhoto || null
    });
  }
  await saveEntries();
  closeModal();
  renderList(); renderMarkers();
});

document.getElementById('deleteBtn').addEventListener('click', async ()=>{
  if (!editingId) return;
  const idx = entries.findIndex(e=>e.id===editingId);
  if (idx < 0) return;
  const [removed] = entries.splice(idx, 1);
  await saveEntries();
  closeModal();
  renderList(); renderMarkers();
  showUndoToast(removed);
});

document.getElementById('dupBtn').addEventListener('click', async ()=>{
  if (!editingId) return;
  const src = entries.find(e=>e.id===editingId);
  if (!src) return;
  const copy = Object.assign({}, src, { id: 'e-' + Date.now(), name: src.name + ' (복사본)' });
  entries.push(copy);
  await saveEntries();
  closeModal();
  renderList(); renderMarkers();
  selectedId = copy.id;
  renderList();
});

/* ---- Undo delete toast ---- */
function showUndoToast(removed){
  const toast = document.getElementById('undoToast');
  clearTimeout(window._undoTimer);
  toast.querySelector('.msg').textContent = `"${removed.name}" 삭제됨`;
  toast._removed = removed;
  toast.classList.add('show');
  window._undoTimer = setTimeout(()=> toast.classList.remove('show'), 6000);
}
document.getElementById('undoBtn').addEventListener('click', async ()=>{
  const toast = document.getElementById('undoToast');
  if (toast._removed){
    entries.push(toast._removed);
    toast._removed = null;
    await saveEntries();
    renderList(); renderMarkers();
  }
  toast.classList.remove('show');
});

/* ---- Export / Import backup ---- */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `나주생태지도-백업-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById('importInput').addEventListener('change', (ev)=>{
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('형식 오류');
      const existingIds = new Set(entries.map(x=>x.id));
      let added = 0;
      imported.forEach(item=>{
        if (!item || !item.name) return;
        if (!item.id || existingIds.has(item.id)){
          item.id = 'e-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
        }
        existingIds.add(item.id);
        entries.push(item);
        added++;
      });
      await saveEntries();
      renderList(); renderMarkers();
      alert(`${added}개의 기록을 불러왔어요.`);
    }catch(err){
      alert('파일을 읽을 수 없어요. 이 사이트에서 "내보내기"로 저장한 JSON 백업 파일인지 확인해주세요.');
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
});

/* ========================= Init ========================= */
document.getElementById('sidebarToggle').addEventListener('click', ()=>{
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  sidebar.classList.toggle('collapsed');
  toggle.classList.toggle('collapsed');
  toggle.textContent = sidebar.classList.contains('collapsed') ? '‹' : '›';
  setTimeout(()=> map.invalidateSize(), 200);
});

loadEntries();
</script>
